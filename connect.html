<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Others</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mainconnect">

        <div class="navbar">
        <div class="menu">
        <a href="index.html">HOME</a>
        <a href="connect.html">CONNECT WITH OTHERS</a>
        <a href="contact.html">CONTACT US</a>
        <a href="gallery.html">GALLERY</a>
        </div>
        
        <div class="search-bar">
          <input type="text" placeholder="Search camera...">
        </div>
    </div>

    <div class="connect">

    <div class="leftchat">
        <div class="chat left">
            Hey everyone! What's the best camera these days?
        </div>
        <div class="chat left">
            I've been hearing a lot of good things about Canon EOS R5 II!
        </div>
    </div>

    <div class="rightchat">

        <div class="chat right short">
            Hello, I own one! Here is a sample shot
        </div>
        <div class="chatpic">
            <img src="https://images.pexels.com/photos/37255800/pexels-photo-37255800.jpeg" alt="Lakeside view with Clear Sky">
            <p class="photo-tags">Tags: Canon, Lake, Nature</p>
        </div>
        <div class="chat right">
            See more photos on my own website!
        </div>
        <div class="chat right website-link">
            myphotosgall.com
        </div>
    </div>

    <div class="message">
        <button class="add-btn">+</button>
        <input type="text" placeholder="Share your thoughts">
    </div>
</div>
</body>
</html>
